name: LMS
options:
  bundleIdPrefix: com.lms
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  LMS:
    type: application
    platform: iOS
    sources:
      - path: LMS
        excludes:
          - "**/.DS_Store"
    resources:
      - path: LMS/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        PRODUCT_BUNDLE_IDENTIFIER: com.lms.app
        SWIFT_EMIT_LOC_STRINGS: YES

  LMSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LMSTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: LMS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LMS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LMS"
        BUNDLE_LOADER: "$(TEST_HOST)"
        PRODUCT_BUNDLE_IDENTIFIER: com.lms.tests

  LMSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LMSUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: LMS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: LMS
        PRODUCT_BUNDLE_IDENTIFIER: com.lms.uitests

schemes:
  LMS:
    build:
      targets:
        LMS: all
        LMSTests: [test]
        LMSUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LMSTests
        - LMSUITests
